version: '3.8'
services:
  # تطبيق المتجر بتاعنا
  web-app:
    build: .
    ports:
      - "3000:3000"

  # جينكنز (المسؤول عن الـ Pipeline)
  jenkins:
    image: jenkins/jenkins:lts
    user: root
    ports:
      - "8080:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

  # سونار كيوب (فحص جودة الكود)
  sonarqube:
    image: sonarqube:community
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data

volumes:
  jenkins_home:
  sonarqube_data: