apiVersion: apps/v1
kind: Deployment
metadata:
  name: digital-store-app
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: digital-store
  template:
    metadata:
      labels:
        app: digital-store
    spec:
      containers:
      - name: digital-store
        image: sarasalah24/digital-store:latest  
        ports:
        - containerPort: 80